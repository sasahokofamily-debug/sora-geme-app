<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Sora Games NEXT - 個性強化版</title>
<style>
body{margin:0;background:#0b1022;color:white;font-family:system-ui,sans-serif;overflow:hidden}.portal{position:fixed;inset:0;overflow:auto;background:radial-gradient(circle at 20% 0,#335 0,#10162e 36%,#070914 100%);padding:22px}.hero{max-width:1180px;margin:0 auto 18px}.hero h1{font-size:38px;margin:0}.grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}.card{border-radius:24px;padding:16px;background:linear-gradient(160deg,rgba(255,255,255,.13),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.18);box-shadow:0 16px 40px rgba(0,0,0,.28)}.icon{font-size:44px}.card h3{margin:4px 0;font-size:22px}.card p{color:#d7ddff;font-size:13px;line-height:1.45}.play{width:100%;border:0;border-radius:16px;padding:12px 10px;background:linear-gradient(#fff3a1,#ffb32b);box-shadow:0 5px 0 #8c5a00;color:#251800;font-weight:1000;font-size:15px}.gameScreen{display:none;position:fixed;inset:0;background:#000;overflow:hidden}.topbar{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(0,0,0,.72);z-index:20;display:flex;align-items:center;justify-content:space-between;padding:8px 12px}.topbar button{border:0;border-radius:999px;padding:9px 12px;font-weight:900}.canvas{width:100vw;height:100vh;display:block}.hud{font-weight:1000}.hint{font-size:12px;color:#cfe}.touch{position:fixed;bottom:18px;left:18px;right:18px;z-index:30;display:flex;justify-content:space-between;pointer-events:none}.pad,.acts{pointer-events:auto}.pad{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.35);position:relative}.knob{position:absolute;left:41px;top:41px;width:38px;height:38px;border-radius:50%;background:#fff59a;border:2px solid #614000}.acts{display:flex;gap:9px;align-items:end}.act{width:74px;height:74px;border-radius:50%;border:2px solid rgba(255,255,255,.7);background:linear-gradient(#ff6b6b,#b70022);color:white;font-weight:1000}.act.alt{background:linear-gradient(#6bdcff,#2357ff)}
</style></head><body>
<div class="portal" id="portal"><div class="hero"><h1>🎮 Sora Games NEXT</h1><p>GitHub index.html 版。ゲームを選んで遊べます。</p></div><div class="grid" id="grid"></div></div>
<div class="gameScreen" id="gameScreen"><canvas id="cv" class="canvas"></canvas><div class="topbar"><button onclick="backPortal()">← 戻る</button><div><div class="hud" id="hud">SCORE 0</div><div class="hint" id="hint"></div></div><button onclick="restartGame()">リスタート</button></div><div class="touch"><div class="pad" id="pad"><div class="knob" id="knob"></div></div><div class="acts"><button class="act alt" id="btnB">B</button><button class="act" id="btnA">A</button></div></div></div>
<script>
const GAMES=[
{id:'deer',icon:'🦌',title:'鹿せんべいキングDX',desc:'鹿にせんべいをあげる奈良公園アクション。'},
{id:'mecha',icon:'🚀',title:'メカシューキング',desc:'メカで敵とボスを倒すシューティング。'},
{id:'piano',icon:'🎹',title:'ピアノスターDX',desc:'音符に合わせて鍵盤を押すリズムゲーム。'},
{id:'rail',icon:'🚄',title:'銀河運転士NEO',desc:'駅にピッタリ停車する宇宙鉄道運転ゲーム。'},
{id:'tactics',icon:'⚔️',title:'タタカイーズOPS',desc:'BOT部隊と戦う戦略アクション。'},
{id:'moon',icon:'🌙',title:'月面宅配ロケット',desc:'月面基地へ荷物を届ける着陸ゲーム。'},
{id:'ninja',icon:'🥷',title:'忍者屋根ランナー',desc:'屋根を走るジャンプアクション。'},
{id:'chef',icon:'🍳',title:'爆速キッチンパニック',desc:'注文通りに料理する判断ゲーム。'},
{id:'dragon',icon:'🎣',title:'ドラゴン釣り島',desc:'タイミングで魚やドラゴンを釣るゲーム。'},
{id:'maze',icon:'🧪',title:'スライム迷宮研究所',desc:'スライムから逃げて出口を探す迷路ゲーム。'}
];
let audio=null,soundOn=true;function tone(f=440,d=.08){if(!soundOn)return;let A=audio||(audio=new (AudioContext||webkitAudioContext)());if(A.state==='suspended')A.resume();let o=A.createOscillator(),g=A.createGain();o.frequency.value=f;g.gain.value=.06;o.connect(g);g.connect(A.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,A.currentTime+d);o.stop(A.currentTime+d)}
const grid=document.getElementById('grid');grid.innerHTML=GAMES.map(g=>`<div class="card"><div class="icon">${g.icon}</div><h3>${g.title}</h3><p>${g.desc}</p><button class="play" onclick="startGame('${g.id}')">▶ 遊ぶ</button></div>`).join('');
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),portal=document.getElementById('portal'),screen=document.getElementById('gameScreen'),hud=document.getElementById('hud'),hint=document.getElementById('hint');let W,H,cur=null,S={},keys={},joy={x:0,y:0},actA=false,actB=false,raf=0,last=0;function resize(){W=innerWidth;H=innerHeight;cv.width=W;cv.height=H}addEventListener('resize',resize);resize();
function startGame(id){cur=id;portal.style.display='none';screen.style.display='block';init();cancelAnimationFrame(raf);last=0;raf=requestAnimationFrame(loop);tone(660)}function backPortal(){screen.style.display='none';portal.style.display='block';cancelAnimationFrame(raf)}function restartGame(){startGame(cur)}function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function init(){S={score:0,t:0,p:{x:W/2,y:H-100},items:[],shots:[],hp:100};for(let i=0;i<10;i++)S.items.push({x:rnd(40,W-40),y:rnd(80,H-180),vx:rnd(-1,1),vy:rnd(-1,1),r:rnd(18,32),kind:i})}
function loop(ts){let dt=Math.min((ts-last)/1000||0,.033);last=ts;update(dt);draw();raf=requestAnimationFrame(loop)}
function update(dt){S.t+=dt;let mx=joy.x+(keys.a||keys.ArrowLeft?-1:0)+(keys.d||keys.ArrowRight?1:0),my=joy.y+(keys.w||keys.ArrowUp?-1:0)+(keys.s||keys.ArrowDown?1:0);S.p.x=clamp(S.p.x+mx*260*dt,20,W-20);S.p.y=clamp(S.p.y+my*260*dt,70,H-30);if(actA||keys[' ']){S.shots.push({x:S.p.x,y:S.p.y});actA=false;tone(520)}S.items.forEach(o=>{o.x+=o.vx*80*dt;o.y+=o.vy*80*dt;if(o.x<20||o.x>W-20)o.vx*=-1;if(o.y<70||o.y>H-160)o.vy*=-1});S.shots.forEach(b=>b.y-=500*dt);for(let b of S.shots)for(let o of S.items)if(Math.hypot(b.x-o.x,b.y-o.y)<o.r+8){S.score+=cur==='deer'?100:50;o.x=rnd(40,W-40);o.y=rnd(80,H-180);tone(880)}S.shots=S.shots.filter(b=>b.y>-20);hud.textContent=`${GAMES.find(g=>g.id===cur).title} SCORE ${S.score}`;hint.textContent='移動：WASD/スティック　A/Space：アクション'}
function draw(){ctx.fillStyle='#071020';ctx.fillRect(0,0,W,H);for(let i=0;i<80;i++){ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillRect((i*97+S.t*40)%W,(i*43)%H,2,2)}S.items.forEach(o=>{ctx.fillStyle=cur==='deer'?'#9b633c':cur==='mecha'?'#f44':cur==='piano'?'#d17bff':'#6cf';ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='18px sans-serif';ctx.fillText(cur==='deer'?'🦌':cur==='mecha'?'👾':cur==='piano'?'♪':'●',o.x-10,o.y+7)});S.shots.forEach(b=>{ctx.fillStyle='#ffe266';ctx.beginPath();ctx.arc(b.x,b.y,8,0,Math.PI*2);ctx.fill()});ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(S.p.x,S.p.y,22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.fillRect(S.p.x-4,S.p.y-22,8,24)}
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;keys[e.key]=true});addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;keys[e.key]=false});document.getElementById('btnA').onpointerdown=()=>{actA=true};document.getElementById('btnB').onpointerdown=()=>{actB=true};let pad=document.getElementById('pad'),knob=document.getElementById('knob');function padMove(e){let r=pad.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2,l=Math.hypot(x,y)||1,m=36,nx=x/l*Math.min(l,m),ny=y/l*Math.min(l,m);joy.x=nx/m;joy.y=ny/m;knob.style.left=41+nx+'px';knob.style.top=41+ny+'px'}pad.onpointerdown=e=>{pad.setPointerCapture(e.pointerId);padMove(e)};pad.onpointermove=e=>{if(e.buttons)padMove(e)};pad.onpointerup=()=>{joy.x=joy.y=0;knob.style.left='41px';knob.style.top='41px'};
</script></body></html>
