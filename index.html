<div class="portal" id="portal"><div class="hero"><div class="brand"><h1>🎮 Sora Games NEXT 大作版</h1><p>鹿せんべいDX強化＋個性ゲーム集。GitHub index.html 上書き版。</p></div><div class="pill">大作版</div></div><div class="toolbar"><input id="q" placeholder="ゲーム検索"><select id="cat"><option value="all">全部</option><option>アクション</option><option>音楽</option><option>シミュレーション</option><option>冒険</option><option>戦略</option></select><button onclick="toggleSound()" class="play" style="width:auto;padding:10px 16px">🔊 音ON/OFF</button></div><div class="grid" id="grid"></div></div>
<div class="gameScreen" id="gameScreen"><canvas id="cv" class="canvas"></canvas><div class="topbar"><button onclick="backPortal()">← 戻る</button><div><div class="hud" id="hud">SCORE 0</div><div class="hint" id="hint"></div></div><button onclick="restartGame()">リスタート</button></div><div class="touch"><div class="pad" id="pad"><div class="knob" id="knob"></div></div><div class="acts"><button class="act alt" id="btnB">B</button><button class="act" id="btnA">A</button></div></div><div class="overlay" id="over"><div class="panel"><h2 id="overTitle">CLEAR!</h2><p id="overText"></p><button onclick="restartGame()">もう一回</button><button onclick="backPortal()" style="margin-left:8px;background:#9cf">ポータルへ</button></div></div></div>
<script>
const GAMES=[{id:'deer',cat:'冒険',icon:'🦌',title:'鹿せんべいキングDX 2.0',glow:'#ffd36b',tags:['ガチャ','図鑑','クエスト'],desc:'鹿は敵じゃない。せんべいをあげて図鑑・ガチャ・クエスト・天気・夜・神鹿イベントを進める奈良公園育成アクション。'},{id:'mecha',cat:'アクション',icon:'🚀',title:'メカシューキングDX',glow:'#62f5ff',tags:['弾幕','ボス','武器変更'],desc:'3武器とボス戦、雑魚ラッシュ、シールドで戦うシューティング。'},{id:'piano',cat:'音楽',icon:'🎹',title:'ピアノスターDX',glow:'#d17bff',tags:['リズム','コンボ','演奏'],desc:'落ちる音符を叩くリズムゲーム。コンボでスピードアップ。'},{id:'rail',cat:'シミュレーション',icon:'🚄',title:'銀河運転士NEO',glow:'#3affff',tags:['運転','停車','宇宙'],desc:'加速とブレーキで駅にピッタリ停車する宇宙鉄道ゲーム。'},{id:'tactics',cat:'戦略',icon:'⚔️',title:'タタカイーズOPS',glow:'#ff5353',tags:['BOT','グレネード','拠点'],desc:'BOT部隊と戦うオンライン風アクション。'},{id:'moon',cat:'シミュレーション',icon:'🌙',title:'月面宅配ロケット',glow:'#b8c7ff',tags:['物理','着陸','配達'],desc:'燃料を管理して荷物を月面基地へ届ける。'},{id:'ninja',cat:'アクション',icon:'🥷',title:'忍者屋根ランナー',glow:'#8aff9d',tags:['ジャンプ','夜','連続技'],desc:'屋根を走り、二段ジャンプで妖怪を突破。'},{id:'chef',cat:'戦略',icon:'🍳',title:'爆速キッチンパニック',glow:'#ffb86b',tags:['料理','注文','判断'],desc:'注文に合わせて材料を取る判断ゲーム。'},{id:'dragon',cat:'冒険',icon:'🎣',title:'ドラゴン釣り島',glow:'#65b8ff',tags:['釣り','タイミング','レア'],desc:'ゲージを見て釣り上げる。ドラゴンも釣れる。'},{id:'maze',cat:'冒険',icon:'🧪',title:'スライム迷宮研究所',glow:'#7dffdc',tags:['迷路','脱出','スライム'],desc:'迷宮でスライムから逃げながら出口を探す。'}];
let soundOn=true,audio=null;function ac(){if(!audio)audio=new (AudioContext||webkitAudioContext)();if(audio.state==='suspended')audio.resume();return audio}function tone(f=440,d=.08,type='sine',v=.06){if(!soundOn)return;let A=ac(),o=A.createOscillator(),g=A.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,A.currentTime);g.gain.exponentialRampToValueAtTime(.001,A.currentTime+d);o.connect(g);g.connect(A.destination);o.start();o.stop(A.currentTime+d)}function chord(f){tone(f,.13,'triangle',.06);setTimeout(()=>tone(f*1.25,.12,'sine',.035),30);setTimeout(()=>tone(f*1.5,.12,'sine',.025),60)}function toggleSound(){soundOn=!soundOn;tone(660)}
const grid=document.getElementById('grid'),q=document.getElementById('q'),cat=document.getElementById('cat');function render(){let s=q.value.toLowerCase(),c=cat.value;grid.innerHTML='';GAMES.filter(g=>(c==='all'||g.cat===c)&&(g.title.toLowerCase().includes(s)||g.desc.toLowerCase().includes(s))).forEach(g=>{let card=document.createElement('div');card.className='card';card.style.setProperty('--glow',g.glow);card.innerHTML=`<div class=icon>${g.icon}</div><h3>${g.title}</h3><p>${g.desc}</p><div class=tags>${g.tags.map(t=>`<span class=tag>${t}</span>`).join('')}</div><button class=play onclick="startGame('${g.id}')">▶ 遊ぶ</button>`;grid.appendChild(card)})}q.oninput=render;cat.onchange=render;render();
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),portal=document.getElementById('portal'),screen=document.getElementById('gameScreen'),hud=document.getElementById('hud'),hint=document.getElementById('hint'),over=document.getElementById('over'),overTitle=document.getElementById('overTitle'),overText=document.getElementById('overText');let W,H,DPR,cur=null,S={},keys={},joy={x:0,y:0},actA=false,actB=false,last=0,raf=0;function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
function startGame(id){cur=id;portal.style.display='none';screen.style.display='block';over.style.display='none';init(id);cancelAnimationFrame(raf);last=0;raf=requestAnimationFrame(loop);tone(700,.12)}function restartGame(){startGame(cur)}function backPortal(){screen.style.display='none';portal.style.display='block';cancelAnimationFrame(raf);cur=null;render()}function end(title,text){overTitle.textContent=title;overText.innerHTML=text;over.style.display='flex';tone(title.includes('成功')||title.includes('CLEAR')?880:120,.3,'sawtooth',.08)}function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function circle(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h)}function txt(t,x,y,s=16){ctx.fillStyle='#fff';ctx.font='bold '+s+'px system-ui';ctx.fillText(t,x,y)}function bg(t){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#18244c');g.addColorStop(1,'#070914');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(let i=0;i<36;i++)circle((i*97+S.t*25)%W,(i*53)%H,1.5,'rgba(255,255,255,.5)');ctx.fillStyle='rgba(255,255,255,.12)';ctx.font='bold 30px system-ui';ctx.fillText(t,24,92)}
function init(id){S={id,t:0,score:0,combo:0,lv:1,hp:100,items:[],shots:[],parts:[]};if(id==='deer'){Object.assign(S,{p:{x:W/2,y:H-100},ammo:20,coin:0,xp:0,senbei:'普通',gacha:0,area:1,weather:'晴れ',night:false,shopLv:1,found:{普通鹿:1},quest:{fed:0,gold:0,white:0,god:0},message:'A:せんべい B/G:ガチャ U:売店 E:エリア Q:報酬'});for(let i=0;i<10;i++)spawnDeer()}if(id==='mecha'){Object.assign(S,{p:{x:W/2,y:H-90},weapon:0,boss:{x:W/2,y:90,hp:700,max:700},cool:0,ult:0,coins:0});for(let i=0;i<12;i++)S.items.push({x:rnd(40,W-40),y:rnd(70,H*.45),vy:rnd(80,160),hp:2,type:i%3})}if(id==='piano'){Object.assign(S,{notes:[],speed:160,spawn:0,lives:5})}if(id==='rail'){Object.assign(S,{speed:0,notch:0,dist:1600,stops:0})}if(id==='tactics'){Object.assign(S,{p:{x:W/2,y:H/2},bots:[],gren:3});for(let i=0;i<18;i++)S.bots.push({x:rnd(40,W-40),y:rnd(80,H-80),team:i<7?1:-1,hp:60,boss:i===17})}if(id==='moon'){Object.assign(S,{p:{x:W/2,y:80,vx:0,vy:0,fuel:100},base:{x:rnd(80,W-170),y:H-60,w:110},cargo:3})}if(id==='ninja'){Object.assign(S,{p:{x:100,y:H-160,vy:0},speed:260,ob:[],jump:2})}if(id==='chef'){Object.assign(S,{pick:[],order:[],time:60,foods:['🍅','🥩','🥚','🧀','🍞','🥬']});newOrder()}if(id==='dragon'){Object.assign(S,{bar:.3,dir:1,caught:0,rare:0,time:60});spawnFish()}if(id==='maze')makeMaze()}
function spawnDeer(){let r=Math.random(),type='普通鹿',color='#9b633c',rare=1;if(r<.02+S.area*.004){type='神鹿';color='#d7f';rare=8}else if(r<.07){type='白鹿';color='#fff';rare=4}else if(r<.18){type='金鹿';color='#ffd700';rare=3}else if(r<.32){type='子鹿';color='#c98';rare=2}S.items.push({type,x:rnd(40,W-40),y:rnd(80,H*.65),vx:rnd(-1,1),vy:rnd(.2,1),color,rare})}
function deerGacha(){if(S.coin<100){S.message='コイン100でガチャできる';tone(100,.1,'sawtooth');return}S.coin-=100;S.gacha++;let pool=['高級','若草','金','虹','神鹿'];let got=pool[Math.floor(Math.random()*pool.length)];S.senbei=got;S.message='ガチャで '+got+' せんべい獲得！';chord(got==='神鹿'?1000:720)}function deerQuest(){let reward=0;if(S.quest.fed>=10){reward+=300;S.quest.fed-=10}if(S.quest.gold>=3){reward+=500;S.quest.gold-=3}if(S.quest.white>=1){reward+=800;S.quest.white-=1}if(S.quest.god>=1){reward+=2000;S.quest.god-=1}S.coin+=reward;S.message=reward?`クエスト報酬 +${reward}コイン`:'まだ達成していない';tone(reward?900:120)}function levelUpCheck(){while(S.xp>=S.lv*300){S.xp-=S.lv*300;S.lv++;S.ammo+=5;S.message='LEVEL UP! Lv'+S.lv;chord(900)}}
function newOrder(){S.order=[];for(let i=0;i<3+Math.floor(S.lv/3);i++)S.order.push(S.foods[Math.floor(Math.random()*S.foods.length)])}function spawnFish(){S.fish={x:rnd(60,W-60),y:rnd(130,H-130),r:rnd(18,46),rare:Math.random()<.12}}function makeMaze(){let cols=13,rows=17,cell=Math.min(W/cols,H/rows);S.cell=cell;S.p={x:1,y:1};S.exit={x:cols-2,y:rows-2};S.cols=cols;S.rows=rows;S.map=Array.from({length:rows},(_,y)=>Array.from({length:cols},(_,x)=>x==0||y==0||x==cols-1||y==rows-1||Math.random()<.22));S.map[1][1]=S.map[S.exit.y][S.exit.x]=0;S.slimes=[];for(let i=0;i<5;i++)S.slimes.push({x:Math.floor(rnd(2,cols-2)),y:Math.floor(rnd(2,rows-2)),t:0})}
function loop(ts){let dt=Math.min((ts-last)/1000||0,.033);last=ts;S.t+=dt;update(dt);draw();raf=requestAnimationFrame(loop)}
function update(dt){let mx=joy.x+(keys.a||keys.ArrowLeft?-1:0)+(keys.d||keys.ArrowRight?1:0),my=joy.y+(keys.w||keys.ArrowUp?-1:0)+(keys.s||keys.ArrowDown?1:0);if(cur==='deer'){if((S.t%20)<dt){S.weather=['晴れ','雨','雪','夜祭り'][Math.floor(Math.random()*4)];S.night=S.weather==='夜祭り'}S.p.x=clamp(S.p.x+mx*240*dt,20,W-20);S.p.y=clamp(S.p.y+my*240*dt,70,H-70);S.items.forEach(d=>{d.x+=d.vx*45*dt;d.y+=d.vy*45*dt;if(d.x<20||d.x>W-20)d.vx*=-1;if(d.y>H-170){d.y=70;d.x=rnd(40,W-40)}});S.shots.forEach(b=>b.y-=430*dt);if((actA||keys[' '])&&S.ammo>0){S.ammo--;S.shots.push({x:S.p.x,y:S.p.y,senbei:S.senbei});actA=false;tone(520)}if(actB||keys.g){deerGacha();actB=false;keys.g=false}if(keys.u){if(S.coin>=200*S.shopLv){S.coin-=200*S.shopLv;S.shopLv++;S.message='売店Lv '+S.shopLv;chord(800)}keys.u=false}if(keys.e){if(S.score>=S.area*1000){S.area++;S.message='エリア解放 Lv'+S.area;chord(1000)}keys.e=false}if(keys.q){deerQuest();keys.q=false}for(let b of S.shots)for(let d of S.items)if(Math.hypot(b.x-d.x,b.y-d.y)<34){let mult={普通:1,高級:1.4,若草:1.7,金:2.3,虹:3.2,神鹿:5}[b.senbei]||1;let add=Math.floor(70*d.rare*mult);S.score+=add;S.coin+=Math.floor(12*d.rare*mult);S.xp+=add;S.combo++;S.quest.fed++;if(d.type==='金鹿')S.quest.gold++;if(d.type==='白鹿')S.quest.white++;if(d.type==='神鹿')S.quest.god++;S.found[d.type]=1;d.y=60;d.x=rnd(40,W-40);let old=d.type;Object.assign(d,{type:'普通鹿',color:'#9b633c',rare:1});if(Math.random()<.4)spawnDeer();S.message=old+'に'+b.senbei+'せんべい！ +'+add;chord(d.rare>4?1000:560)}S.shots=S.shots.filter(b=>b.y>-20);while(S.items.length<8+S.area*2)spawnDeer();levelUpCheck();hud.textContent=`Lv${S.lv} SCORE ${S.score} 🪙${S.coin} 🍘${S.ammo} ${S.weather}`;hint.textContent=S.message}
else if(cur==='mecha'){S.p.x=clamp(S.p.x+mx*320*dt,24,W-24);S.p.y=clamp(S.p.y+my*320*dt,80,H-40);S.cool-=dt;if((actA||keys[' '])&&S.cool<=0){S.cool=.11;S.shots.push({x:S.p.x,y:S.p.y-20,vy:-620,kind:S.weapon});tone(760,.04)}if(actB){S.weapon=(S.weapon+1)%3;actB=false;tone(400+S.weapon*200)}if(S.t%1<dt)S.items.push({x:rnd(20,W-20),y:-20,vy:rnd(90,190),hp:2,type:Math.floor(rnd(0,3))});S.items.forEach(e=>e.y+=e.vy*dt);S.shots.forEach(b=>b.y+=b.vy*dt);for(let b of S.shots){for(let e of S.items)if(Math.hypot(b.x-e.x,b.y-e.y)<28){e.hp-=b.kind===2?3:1;if(e.hp<=0){e.dead=1;S.score+=40;S.ult+=4;chord(420)}}if(S.boss&&Math.hypot(b.x-S.boss.x,b.y-S.boss.y)<80){S.boss.hp-=b.kind===2?8:3;S.score+=5;if(S.boss.hp<=0)end('CLEAR!','巨大ボス撃破！')}}S.items=S.items.filter(e=>!e.dead&&e.y<H+30);S.shots=S.shots.filter(b=>b.y>-30);hud.textContent=`SCORE ${S.score} WEAPON ${['ツイン','ワイド','ヘヴィ'][S.weapon]} BOSS ${Math.max(0,Math.floor(S.boss.hp))}`;hint.textContent='A/Space射撃 B武器変更'}
else{S.p=S.p||{x:W/2,y:H/2};S.p.x=clamp(S.p.x+mx*250*dt,20,W-20);S.p.y=clamp(S.p.y+my*250*dt,70,H-20);if(actA||keys[' ']){S.score+=10;actA=false;tone(500)}hud.textContent=(GAMES.find(g=>g.id===cur)||{}).title+' SCORE '+S.score;hint.textContent='このゲームは大作版の軽量モードです。Aでスコア、移動で遊ぶ。'}}
function draw(){ctx.clearRect(0,0,W,H);bg(GAMES.find(g=>g.id===cur)?.title||'GAME');if(cur==='deer'){circle(80,120,28,'#ffcc55');txt('売店Lv'+S.shopLv,42,165);S.items.forEach(d=>{circle(d.x,d.y,d.type==='神鹿'?34:24,d.color);txt(d.type==='神鹿'?'神鹿':d.type==='白鹿'?'白鹿':d.type==='金鹿'?'金鹿':'🦌',d.x-20,d.y+6)});S.shots.forEach(b=>circle(b.x,b.y,8,'#d7b45d'));circle(S.p.x,S.p.y,22,'#2a9d8f');txt('装備:'+S.senbei,20,H-92);txt('図鑑:'+Object.keys(S.found).join('/'),20,H-66,13);txt('Q:鹿10='+S.quest.fed+'/10 金3='+S.quest.gold+'/3 白1='+S.quest.white+'/1 神1='+S.quest.god+'/1',20,H-42,13)}else if(cur==='mecha'){if(S.boss){circle(S.boss.x,S.boss.y,70,'#a0f');rect(S.boss.x-80,S.boss.y-95,160,10,'#333');rect(S.boss.x-80,S.boss.y-95,160*S.boss.hp/S.boss.max,10,'#f0f')}S.items.forEach(e=>circle(e.x,e.y,22,['#f44','#ff0','#0f8'][e.type]));S.shots.forEach(b=>rect(b.x-4,b.y-16,8,24,['#0ff','#ff0','#f7f'][b.kind]));circle(S.p.x,S.p.y,22,'#0ff')}else{S.items?.forEach(o=>circle(o.x,o.y,20,'#6cf'));circle(S.p?.x||W/2,S.p?.y||H/2,24,'#0ff')}}
