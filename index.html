<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sora Games - 人気/すべて切替版</title>
<style>
:root{--bg:#f4f7ff;--ink:#172033;--muted:#667085;--card:#fff;--brand:#00c2ff;--brand2:#7c3aed;--shadow:0 14px 40px rgba(28,45,90,.14)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#dff7ff 0%,#f7efff 45%,#fff7dc 100%);color:var(--ink)}body{overflow-x:hidden}.header{position:sticky;top:0;z-index:20;backdrop-filter:blur(18px);background:rgba(255,255,255,.75);border-bottom:1px solid rgba(255,255,255,.7)}.headerInner{max-width:1180px;margin:auto;padding:14px 18px;display:flex;align-items:center;gap:14px}.logo{font-size:28px;font-weight:950;letter-spacing:-1px;background:linear-gradient(90deg,var(--brand),var(--brand2));-webkit-background-clip:text;color:transparent;white-space:nowrap}.search{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:10px 16px;box-shadow:0 6px 24px rgba(24,40,80,.09)}.search input{border:0;outline:0;font-size:15px;width:100%;background:transparent}.hero{max-width:1180px;margin:24px auto 8px;padding:0 18px;display:grid;grid-template-columns:1.25fr .75fr;gap:18px}.heroMain{min-height:285px;border-radius:34px;padding:30px;background:radial-gradient(circle at 15% 10%,#fff 0 0,#fff8 20%,transparent 42%),linear-gradient(135deg,#8b5cf6,#38bdf8 50%,#ffbc39);color:white;box-shadow:0 18px 50px rgba(60,80,150,.22);position:relative;overflow:hidden}.heroMain:after{content:"🎮";position:absolute;right:28px;bottom:-24px;font-size:155px;filter:drop-shadow(0 10px 15px rgba(0,0,0,.25))}.heroMain h1{font-size:clamp(34px,5vw,60px);line-height:.98;margin:0 0 12px;text-shadow:0 4px 22px rgba(0,0,0,.25)}.heroMain p{font-size:17px;max-width:560px;line-height:1.7;margin:0 0 22px;text-shadow:0 2px 10px rgba(0,0,0,.25)}.playBtn{border:0;border-radius:999px;padding:14px 24px;font-size:18px;font-weight:900;color:#111;background:#fff;box-shadow:0 7px 0 rgba(0,0,0,.22);cursor:pointer}.playBtn:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.22)}.sideCard{border-radius:30px;padding:22px;background:rgba(255,255,255,.88);box-shadow:var(--shadow)}.sideCard h2{margin:0 0 12px;font-size:22px}.tagRow{display:flex;gap:8px;flex-wrap:wrap}.tag{background:#eef2ff;border-radius:999px;padding:8px 12px;font-weight:800;color:#4338ca;font-size:13px}.section{max-width:1180px;margin:18px auto 60px;padding:0 18px}.section h2{font-size:25px;margin:22px 0 14px}.viewTabs{max-width:1180px;margin:12px auto 4px;padding:0 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}.viewTab{border:0;border-radius:999px;padding:12px 18px;font-weight:950;cursor:pointer;background:rgba(255,255,255,.86);color:#344054;box-shadow:0 8px 24px rgba(40,60,110,.10)}.viewTab.active{background:linear-gradient(90deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 10px 28px rgba(80,70,200,.24)}.viewNote{font-size:12px;color:var(--muted);font-weight:800}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px}.gameCard{background:rgba(255,255,255,.92);border-radius:26px;overflow:hidden;box-shadow:0 10px 30px rgba(40,60,110,.13);cursor:pointer;transition:.18s transform,.18s box-shadow;border:1px solid rgba(255,255,255,.8)}.gameCard:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 16px 40px rgba(40,60,110,.22)}.thumb{height:132px;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative}.thumb small{position:absolute;right:10px;top:10px;background:#fff;border-radius:999px;padding:4px 8px;font-weight:900;font-size:11px;color:#111}.thumb.deer{background:linear-gradient(135deg,#8ed8ff,#7aa35a)}.thumb.galaxy{background:radial-gradient(circle at 50% 20%,#152d73,#02030a 70%)}.thumb.piano{background:linear-gradient(135deg,#2b235a,#ff74b8)}.thumb.mech{background:linear-gradient(135deg,#050510,#00c2ff)}.thumb.tactical{background:linear-gradient(135deg,#061018,#ff3158 45%,#00c2ff)}.thumb.stardodge{background:radial-gradient(circle,#5b7cff,#05051b 70%)}.thumb.sushi{background:linear-gradient(135deg,#a7e7ff,#ffcf33)}.thumb.ninja{background:linear-gradient(135deg,#101018,#39ff88)}.gameInfo{padding:14px}.gameInfo b{display:block;font-size:16px;margin-bottom:5px}.gameInfo p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}.ratingBox{margin-top:10px;padding-top:9px;border-top:1px solid rgba(102,112,133,.14);display:flex;align-items:center;justify-content:space-between;gap:8px}.ratingSummary{font-size:12px;font-weight:900;color:#f59e0b;line-height:1.25}.ratingSummary small{display:block;color:var(--muted);font-weight:800;font-size:10px;margin-top:2px}.reviewBtn{border:0;border-radius:999px;padding:7px 10px;background:#eef2ff;color:#4338ca;font-weight:900;font-size:11px;cursor:pointer;white-space:nowrap}.gameShell{position:fixed;inset:0;background:#000;z-index:100;display:none}.gameTop{position:absolute;left:10px;top:10px;z-index:120;display:flex;gap:8px}.backBtn{border:0;border-radius:999px;background:rgba(255,255,255,.92);font-weight:900;padding:10px 14px;box-shadow:0 4px 18px rgba(0,0,0,.25);cursor:pointer}#gameFrame{position:absolute;inset:0;width:100%;height:100%;border:0;background:#111}.reviewModal{position:fixed;inset:0;background:rgba(10,16,30,.62);z-index:200;display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(8px)}.reviewPanel{width:min(560px,96vw);max-height:86vh;overflow:auto;border-radius:28px;background:#fff;color:var(--ink);box-shadow:0 24px 80px rgba(0,0,0,.32);padding:20px}.reviewHead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.reviewHead h2{margin:0;font-size:22px}.closeReview{border:0;border-radius:999px;background:#f1f5f9;font-weight:950;padding:8px 12px;cursor:pointer}.starPick{display:flex;gap:6px;margin:8px 0 12px}.starPick button{border:0;background:#f1f5f9;border-radius:10px;font-size:24px;padding:5px 8px;cursor:pointer;filter:grayscale(.75);transition:.15s}.starPick button.on{background:#fff7ed;filter:none;transform:translateY(-2px)}.reviewPanel input,.reviewPanel textarea{width:100%;border:1px solid #d0d5dd;border-radius:14px;padding:11px 12px;font-size:14px;outline:0;margin:6px 0 10px;font-family:inherit}.reviewPanel textarea{min-height:82px;resize:vertical}.submitReview{border:0;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--brand2));color:#fff;font-weight:950;padding:11px 16px;cursor:pointer}.reviewList{display:grid;gap:9px;margin-top:14px}.reviewItem{background:#f8fafc;border:1px solid #eef2f7;border-radius:16px;padding:10px}.reviewItem b{font-size:13px}.reviewItem p{margin:5px 0 0;color:#475467;font-size:13px;line-height:1.55}.emptyReviews{color:var(--muted);font-size:13px;background:#f8fafc;border-radius:16px;padding:12px}@media(max-width:780px){.hero{grid-template-columns:1fr}.sideCard{display:none}.headerInner{gap:8px}.logo{font-size:22px}.heroMain{border-radius:24px;padding:24px}.heroMain:after{font-size:105px;right:10px}.grid{grid-template-columns:repeat(2,1fr);gap:12px}.thumb{height:110px;font-size:50px}}
</style></head><body>
<header class="header"><div class="headerInner"><div class="logo">Sora Games</div><div class="search">🔎 <input id="search" placeholder="ゲームをさがす"></div></div></header>
<main id="portal"><section class="hero"><div class="heroMain"><h1>Sora Games<br>ゲーム集</h1><p>人気ゲームとすべてのゲームを切り替えられるPoki風ポータル。追加15本は「すべてのゲーム」にだけ表示。</p><button class="playBtn" onclick="playGame('tatakaies')">▶ タタカイーズで遊ぶ</button></div><div class="sideCard"><h2>表示切替</h2><div class="tagRow"><span class="tag">🔥 人気ゲーム</span><span class="tag">🎮 すべてのゲーム</span><span class="tag">追加15本は全ゲームのみ</span></div></div></section><div class="viewTabs"><button class="viewTab active" id="popularTab" onclick="setGameView('popular')">🔥 人気ゲーム</button><button class="viewTab" id="allTab" onclick="setGameView('all')">🎮 すべてのゲーム</button><span class="viewNote">追加15本は「すべてのゲーム」にだけ表示</span></div><section class="section"><h2 id="gamesHeading">人気ゲーム</h2><div class="grid" id="gameGrid"></div></section></main>
<div class="reviewModal" id="reviewModal" onclick="closeReviews(event)"><div class="reviewPanel" onclick="event.stopPropagation()"><div class="reviewHead"><h2 id="reviewTitle">評価と口コミ</h2><button class="closeReview" onclick="closeReviews()">閉じる</button></div><div id="reviewAverage" class="ratingSummary">☆☆☆☆☆<small>口コミ 0件</small></div><div class="starPick" id="starPick"><button onclick="setReviewStars(1)">⭐</button><button onclick="setReviewStars(2)">⭐</button><button onclick="setReviewStars(3)">⭐</button><button onclick="setReviewStars(4)">⭐</button><button onclick="setReviewStars(5)">⭐</button></div><input id="reviewName" maxlength="18" placeholder="名前"><textarea id="reviewText" maxlength="160" placeholder="口コミを書く"></textarea><button class="submitReview" onclick="submitReview()">投稿する</button><div class="reviewList" id="reviewList"></div></div></div>
<div class="gameShell" id="gameShell"><div class="gameTop"><button class="backBtn" onclick="backPortal()">← ポータルに戻る</button><button class="backBtn" id="soundBtn" onclick="togglePortalSound(event)">🔊 音ON</button></div><iframe id="gameFrame" title="Sora Games player" allow="autoplay"></iframe></div>
<script>
const GAME_LIST=[
{id:'deer',popular:true,title:'奈良公園 鹿せんべい大冒険',desc:'鹿せんべいを投げる、強化する、集める。完全版。',icon:'🦌',thumb:'deer',keys:'鹿せんべい 大冒険 奈良 ガチャ'},
{id:'galaxy',popular:true,title:'銀河運転ゲーム',desc:'宇宙の線路を運転。信号・駅・ブレーキで銀河鉄道を走らせる。',icon:'🚆',thumb:'galaxy',keys:'銀河運転 電車 鉄道 宇宙'},
{id:'piano',popular:true,title:'PIANO STAR GAME',desc:'落ちてくる音符に合わせて鍵盤をタップ。自由演奏もあり。',icon:'🎹',thumb:'piano',keys:'ピアノスター 音楽 リズム'},
{id:'mech',popular:true,title:'10大メカ・シューティング',desc:'メカを選んでボスを倒す。隠し報酬メカもあり。',icon:'🚀',thumb:'mech',keys:'メカ シューティング'},
{id:'tatakaies',popular:true,title:'タタカイーズ TACTICAL AI X',desc:'グレネード、ドローン、メディック、戦車、エアストライク入り。',icon:'⚔️',thumb:'tactical',keys:'タタカイーズ FPS 戦闘 AI'},
{id:'stardodge',popular:true,title:'STAR DODGE',desc:'宇宙船を動かして隕石をよける。青い星で高得点。',icon:'🚀',thumb:'stardodge',keys:'スタードッジ 宇宙'},
{id:'sushi',popular:true,title:'SUSHI CATCH',desc:'落ちてくる寿司を皿でキャッチ。爆弾はよけよう。',icon:'🍣',thumb:'sushi',keys:'寿司 キャッチ'},
{id:'ninja',popular:true,title:'NINJA JUMP',desc:'タップでジャンプ。手裏剣と穴をよけて走り抜ける。',icon:'🥷',thumb:'ninja',keys:'忍者 ジャンプ'},
{id:'bubble',title:'バブルポップ',desc:'落ちてくる星をキャッチしてスコアアップ。',icon:'🫧',color:'#0ea5e9',keys:'バブルポップ'},
{id:'dragon',title:'ドラゴンシュート',desc:'ドラゴンでモンスターを撃ち落とす。',icon:'🐉',color:'#7f1d1d',keys:'ドラゴンシュート'},
{id:'catrunner',title:'ネコランナー',desc:'ネコが障害物をジャンプでよける。',icon:'🐱',color:'#38bdf8',keys:'ネコランナー'},
{id:'memory',title:'絵文字メモリー',desc:'同じ絵文字をそろえる記憶ゲーム。',icon:'🧠',color:'#7c3aed',keys:'絵文字メモリー'},
{id:'treasure',title:'宝石クリック',desc:'宝石を押してパワーアップする。',icon:'💎',color:'#312e81',keys:'宝石クリック'},
{id:'rocket',title:'ロケットキャッチ',desc:'星を集めて爆弾をよける。',icon:'🚀',color:'#0f172a',keys:'ロケットキャッチ'},
{id:'ghost',title:'ゴーストバスター',desc:'ゴーストを撃って退治する。',icon:'👻',color:'#581c87',keys:'ゴーストバスター'},
{id:'penguin',title:'ペンギンスライド',desc:'氷の上を走って岩をよける。',icon:'🐧',color:'#0891b2',keys:'ペンギンスライド'},
{id:'fruit',title:'フルーツメモリー',desc:'フルーツのペアを全部見つけよう。',icon:'🍓',color:'#be123c',keys:'フルーツメモリー'},
{id:'farm',title:'ファームクリック',desc:'野菜を収穫して農場を強化。',icon:'🌽',color:'#166534',keys:'ファームクリック'},
{id:'moon',title:'ムーンキャッチ',desc:'夜空でスターを集める。',icon:'🌙',color:'#1e1b4b',keys:'ムーンキャッチ'},
{id:'robot',title:'ロボット防衛',desc:'ロボットで敵UFOを迎撃。',icon:'🤖',color:'#334155',keys:'ロボット防衛'},
{id:'dino',title:'恐竜ダッシュ',desc:'恐竜が石をジャンプでよける。',icon:'🦖',color:'#365314',keys:'恐竜ダッシュ'},
{id:'animal',title:'どうぶつ神経衰弱',desc:'動物カードをそろえる。',icon:'🐼',color:'#92400e',keys:'どうぶつ神経衰弱'},
{id:'magic',title:'魔法クリック',desc:'魔法を集めてパワーアップ。',icon:'🪄',color:'#4c1d95',keys:'魔法クリック'}];
const gameNames=Object.fromEntries(GAME_LIST.map(g=>[g.id,g.title]));let currentGameView='popular';
function renderCards(){const grid=document.getElementById('gameGrid');grid.innerHTML=GAME_LIST.map(g=>`<article class="gameCard" data-popular="${g.popular?'true':'false'}" data-title="${g.keys} ${g.title} ${g.desc}" onclick="playGame('${g.id}')"><div class="thumb ${g.thumb||''}" style="${g.color?`background:linear-gradient(135deg,${g.color},#ffffff33)`:''}">${g.icon}<small>${g.popular?'PLAY':'NEW'}</small></div><div class="gameInfo"><b>${g.title}</b><p>${g.desc}</p><div class="ratingBox" onclick="event.stopPropagation()"><div class="ratingSummary" id="rating-${g.id}">☆☆☆☆☆<small>口コミ 0件</small></div><button class="reviewBtn" onclick="openReviews('${g.id}')">評価・口コミ</button></div></div></article>`).join('');refreshRatings();filterGameCards();}
function setGameView(view){currentGameView=view;document.getElementById('popularTab').classList.toggle('active',view==='popular');document.getElementById('allTab').classList.toggle('active',view==='all');document.getElementById('gamesHeading').textContent=view==='popular'?'人気ゲーム':'すべてのゲーム';filterGameCards();}
function filterGameCards(){const q=document.getElementById('search').value.trim().toLowerCase();document.querySelectorAll('.gameCard').forEach(card=>{const t=(card.dataset.title||card.textContent).toLowerCase();const matchSearch=t.includes(q);const matchView=currentGameView==='all'||card.dataset.popular==='true';card.style.display=(matchSearch&&matchView)?'block':'none';});}
function reviewKey(id){return 'soraGamesReviews_'+id;}function getReviews(id){try{return JSON.parse(localStorage.getItem(reviewKey(id))||'[]')}catch(e){return []}}function saveReviews(id,reviews){localStorage.setItem(reviewKey(id),JSON.stringify(reviews));}function starsText(avg){const full=Math.round(avg||0);return '★★★★★'.slice(0,full)+'☆☆☆☆☆'.slice(0,5-full);}function ratingHtml(id){const reviews=getReviews(id);if(!reviews.length)return '☆☆☆☆☆<small>口コミ 0件</small>';const avg=reviews.reduce((a,r)=>a+Number(r.stars||0),0)/reviews.length;return `${starsText(avg)} ${avg.toFixed(1)}<small>口コミ ${reviews.length}件</small>`;}function refreshRatings(){Object.keys(gameNames).forEach(id=>{const el=document.getElementById('rating-'+id);if(el)el.innerHTML=ratingHtml(id);});}
let currentReviewGame='deer',currentReviewStars=5;function setReviewStars(n){currentReviewStars=n;document.querySelectorAll('#starPick button').forEach((b,i)=>b.classList.toggle('on',i<n));}function openReviews(id){currentReviewGame=id;currentReviewStars=5;document.getElementById('reviewTitle').textContent=gameNames[id]+' の評価と口コミ';document.getElementById('reviewName').value=localStorage.getItem('soraGamesReviewName')||'';document.getElementById('reviewText').value='';setReviewStars(5);renderReviewList();document.getElementById('reviewModal').style.display='flex';}function closeReviews(e){if(e&&e.target.id!=='reviewModal')return;document.getElementById('reviewModal').style.display='none';}function submitReview(){const name=(document.getElementById('reviewName').value||'ゲスト').trim().slice(0,18);const text=(document.getElementById('reviewText').value||'').trim().slice(0,160);if(!text){alert('口コミを書いてね');return;}localStorage.setItem('soraGamesReviewName',name);const reviews=getReviews(currentReviewGame);reviews.unshift({name,text,stars:currentReviewStars,date:new Date().toLocaleDateString('ja-JP')});saveReviews(currentReviewGame,reviews.slice(0,50));document.getElementById('reviewText').value='';renderReviewList();refreshRatings();}function renderReviewList(){const reviews=getReviews(currentReviewGame);document.getElementById('reviewAverage').innerHTML=ratingHtml(currentReviewGame);const list=document.getElementById('reviewList');if(!reviews.length){list.innerHTML='<div class="emptyReviews">まだ口コミはありません。最初の評価を書こう！</div>';return;}list.innerHTML=reviews.map(r=>`<div class="reviewItem"><b>${starsText(r.stars)} ${escapeHtml(r.name||'ゲスト')} <small>${escapeHtml(r.date||'')}</small></b><p>${escapeHtml(r.text||'')}</p></div>`).join('');}function escapeHtml(str){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
let portalAudio=null,portalSoundOn=true;function portalTone(f=440,d=.08){if(!portalSoundOn)return;try{const A=portalAudio||(portalAudio=new (AudioContext||webkitAudioContext)());if(A.state==='suspended')A.resume();const o=A.createOscillator(),g=A.createGain();o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(A.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,A.currentTime+d);o.stop(A.currentTime+d)}catch(e){}}function togglePortalSound(e){if(e)e.stopPropagation();portalSoundOn=!portalSoundOn;document.getElementById('soundBtn').textContent=portalSoundOn?'🔊 音ON':'🔇 音OFF';portalTone(660)}
function miniGameHtml(id){const g=GAME_LIST.find(x=>x.id===id)||GAME_LIST[0];return `<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#071020;color:white;font-family:system-ui,sans-serif}canvas{width:100%;height:100%;display:block}#ui{position:fixed;top:64px;left:16px;font-weight:900;text-shadow:0 2px 8px #000}#hint{position:fixed;bottom:20px;left:20px;right:20px;text-align:center;font-weight:800;background:rgba(0,0,0,.35);border-radius:999px;padding:10px}</style></head><body><canvas id="c"></canvas><div id="ui"></div><div id="hint">タップ/クリックでアクション。左右キーでも動ける。</div><script>const c=document.getElementById('c'),x=c.getContext('2d'),ui=document.getElementById('ui');let W,H,p={x:200,y:300},items=[],score=0,t=0,keys={};function R(a,b){return a+Math.random()*(b-a)}function resize(){W=innerWidth;H=innerHeight;c.width=W;c.height=H}onresize=resize;resize();for(let i=0;i<12;i++)items.push({x:R(30,W-30),y:R(80,H-80),vx:R(-2,2),vy:R(-2,2),bad:Math.random()<.25});function beep(f){try{let A=new (AudioContext||webkitAudioContext)(),o=A.createOscillator(),g=A.createGain();o.frequency.value=f;g.gain.value=.04;o.connect(g);g.connect(A.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,A.currentTime+.08);o.stop(A.currentTime+.08)}catch(e){}}function act(){score+=10;beep(600)}addEventListener('pointerdown',e=>{p.x=e.clientX;p.y=e.clientY;act()});addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')act()});addEventListener('keyup',e=>keys[e.key]=false);function loop(){t++;if(keys.ArrowLeft||keys.a)p.x-=5;if(keys.ArrowRight||keys.d)p.x+=5;if(keys.ArrowUp||keys.w)p.y-=5;if(keys.ArrowDown||keys.s)p.y+=5;x.fillStyle='#071020';x.fillRect(0,0,W,H);for(let i=0;i<70;i++){x.fillStyle='rgba(255,255,255,.6)';x.fillRect((i*91+t)%W,(i*47)%H,2,2)}items.forEach(o=>{o.x+=o.vx;o.y+=o.vy;if(o.x<20||o.x>W-20)o.vx*=-1;if(o.y<70||o.y>H-20)o.vy*=-1;x.font='34px serif';x.fillText(o.bad?'💣':'${g.icon}',o.x-17,o.y+12);if(Math.hypot(p.x-o.x,p.y-o.y)<34){score+=o.bad?-30:100;o.x=R(30,W-30);o.y=R(80,H-80);beep(o.bad?100:900)}});x.font='46px serif';x.fillText('${g.icon}',p.x-23,p.y+18);ui.textContent='${g.title}  SCORE '+score;requestAnimationFrame(loop)}loop();<\/script></body></html>`}
function playGame(id){portalTone(520);const frame=document.getElementById('gameFrame');frame.srcdoc=miniGameHtml(id);document.getElementById('gameShell').style.display='block';document.body.style.overflow='hidden'}function backPortal(){portalTone(300);document.getElementById('gameFrame').srcdoc='';document.getElementById('gameShell').style.display='none';document.body.style.overflow=''}
document.getElementById('search').addEventListener('input',filterGameCards);renderCards();
</script></body></html>
