<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sora Game App</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07111f;color:white;font-family:system-ui,sans-serif;text-align:center}
.box{padding:28px;border:1px solid rgba(255,255,255,.25);border-radius:18px;background:rgba(255,255,255,.08)}
a{color:#7dd3fc}
</style>
</head>
<body>
<div class="box">
<h1>起動中...</h1>
<p>ゲームを読み込んでいます。</p>
<p><a id="open" href="https://cdn.jsdelivr.net/gh/sasahokofamily-debug/sora-geme-app@main/index.html">直接開く</a></p>
</div>
<script>
(async()=>{
  const url='https://cdn.jsdelivr.net/gh/sasahokofamily-debug/sora-geme-app@main/index.html?v='+Date.now();
  try{
    const res=await fetch(url,{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const html=await res.text();
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.querySelector('p').textContent='読み込みに失敗しました。下のリンクから直接開いてください。';
    console.error(e);
  }
})();
</script>
</body>
</html>
